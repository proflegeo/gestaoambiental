<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador: Gestão Ambiental IA</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;700&display=swap');
        
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(135deg, #132a13 0%, #31572c 100%); color: #f5f6fa; text-align: center; margin: 0; padding: 20px; min-height: 100vh; position: relative; }
        h1 { font-family: 'Montserrat', sans-serif; color: #a7c957; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 2px; }
        
        #game-screen { display: none; padding-bottom: 80px; }
        #start-screen { margin-top: 10vh; background: rgba(0, 0, 0, 0.5); padding: 50px; border-radius: 15px; display: inline-block; border: 2px solid #a7c957; box-shadow: 0 0 30px rgba(167, 201, 87, 0.2); }
        #start-screen input { padding: 15px; font-size: 20px; border-radius: 8px; border: none; margin-bottom: 20px; width: 80%; text-align: center; font-family: 'Roboto', sans-serif; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 100; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; box-sizing: border-box;}
        .modal-content { background: #bc4749; padding: 40px; border-radius: 15px; box-shadow: 0 0 40px rgba(188, 71, 73, 0.8); max-width: 700px; width: 100%; }
        .modal-content.feedback { background: #386641; border: 2px solid #a7c957; box-shadow: 0 0 40px rgba(167, 201, 87, 0.4); }
        
        .modal-content h2 { font-family: 'Montserrat', sans-serif; font-size: 32px; margin-top: 0; }
        .modal-content p { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        
        #pergunta-crise { font-size: 18px; font-weight: normal; color: #f5f6fa; margin-bottom: 15px; text-align: left; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; border-left: 4px solid #fbc531;}
        #resposta-crise { width: 100%; padding: 15px; border-radius: 8px; border: 2px solid #132a13; background: rgba(0,0,0,0.4); color: white; font-family: 'Roboto', sans-serif; font-size: 16px; box-sizing: border-box; resize: vertical; margin-bottom: 10px;}
        
        .hud { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; background: rgba(0, 0, 0, 0.5); padding: 20px; border-radius: 10px; max-width: 900px; margin: 0 auto 20px auto; border: 1px solid #4f772d; }
        .stat { font-size: 20px; font-weight: bold; }
        .stat span { color: #f2e8cf; font-family: 'Montserrat', sans-serif; font-size: 24px; }
        
        #approval-bar { width: 150px; height: 15px; background: #bc4749; display: inline-block; margin-left: 10px; border-radius: 8px; overflow: hidden; vertical-align: middle; }
        #approval-fill { height: 100%; width: 50%; background: #6a994e; transition: width 0.3s ease; }
        
        #fase-info { font-size: 22px; color: #a7c957; font-weight: bold; margin-bottom: 20px; text-transform: uppercase;}
        
        .game-board { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .drop-zone { width: 240px; height: 150px; background-color: rgba(255, 255, 255, 0.05); border: 3px dashed #a7c957; border-radius: 12px; display: flex; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; text-align: center; font-size: 16px; color: #a7c957; font-weight: bold; }
        .drop-zone.success { border-color: #6a994e; background-color: rgba(106, 153, 78, 0.2); color: white; border-style: solid; }
        
        .card { background: linear-gradient(135deg, #386641 0%, #4f772d 100%); color: white; padding: 15px; border-radius: 10px; cursor: grab; width: 220px; font-size: 16px; font-weight: bold; box-shadow: 0 6px 15px rgba(0,0,0,0.5); border: 2px solid #a7c957; }
        .btn { background: #6a994e; color: white; border: none; padding: 15px 30px; font-family: 'Montserrat', sans-serif; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn:disabled { background: #7f8fa6; cursor: not-allowed; }
        
        #ranking-container { display: none; margin: 30px auto; max-width: 600px; background: rgba(0, 0, 0, 0.7); padding: 25px; border-radius: 12px; border: 2px solid #a7c957; }
        .ranking-table { width: 100%; text-align: left; border-collapse: collapse; }
        .ranking-table td, .ranking-table th { padding: 10px; border-bottom: 1px solid #4f772d; }

        .watermark { position: fixed; bottom: 15px; right: 20px; color: rgba(255, 255, 255, 0.3); font-family: 'Montserrat', sans-serif; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="font-size: 40px; margin-bottom: 20px;">🌍 GESTÃO AMBIENTAL IA</h1>
        <p style="font-size: 22px; margin-bottom: 30px;">Simulador oficial Legeo com Auditoria por IA.</p>
        <input type="text" id="player-name" placeholder="Secretário(a) / Equipe">
        <br><button class="btn" id="btn-iniciar" onclick="startGame()" disabled>CONECTANDO AO CONSELHO...</button>
    </div>

    <div id="game-screen">
        <div class="hud">
            <div class="stat">Aprovação: <div id="approval-bar"><div id="approval-fill"></div></div> <span id="approval-text">50%</span></div>
            <div class="stat">Pontos ECO: <span id="score-display">0</span></div>
        </div>
        <div id="fase-info">Analisando Bioma...</div>

        <div class="game-board">
            <div id="zone-causa" class="drop-zone" data-type="causa">Arraste a Causa</div>
            <div id="zone-problema" class="drop-zone" data-type="problema">Arraste o Problema</div>
            <div id="zone-consequencia" class="drop-zone" data-type="consequencia">Arraste a Consequência</div>
            <div id="zone-solucao" class="drop-zone" data-type="solucao">Arraste a Solução</div>
        </div>

        <div style="margin-top: 30px;">
            <button class="btn" onclick="checkAnswers()" id="btn-check">Aprovar Plano</button>
            <button class="btn" id="btn-next" onclick="processarProximaFase()" style="display:none">Próximo Desafio ➡️</button>
        </div>
        
        <div id="message" style="margin-top: 25px; font-size: 24px;"></div>
        <div id="card-bank" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; padding: 25px; background: rgba(0, 0, 0, 0.3); border-radius: 15px;"></div>
        <div id="ranking-container"></div>
        
        <button class="btn" id="btn-end" onclick="finalizarJogo()" style="margin-top: 40px; font-size: 14px; opacity: 0.7;">🛑 Encerrar e Enviar Relatório</button>
    </div>

    <div class="modal-overlay" id="modal-crise">
        <div class="modal-content">
            <h2>🚨 DESASTRE AMBIENTAL!</h2>
            <p id="texto-crise" style="font-weight: normal;"></p>
            <div id="pergunta-crise"></div>
            <textarea id="resposta-crise" rows="4" placeholder="Redija o Parecer Técnico..."></textarea>
            <div id="erro-crise" style="color: #f2e8cf; display: none; margin-bottom: 15px;">⚠️ Detalhe mais sua resposta!</div>
            <button class="btn" onclick="avaliarDecreto()" style="width: 100%; background: #132a13;">Enviar para Auditoria (IA)</button>
        </div>
    </div>
    
    <div class="modal-overlay" id="modal-feedback">
        <div class="modal-content feedback">
            <h2>📊 PARECER DO CONSELHO</h2>
            <p id="texto-feedback"></p>
            <div id="status-feedback" style="font-size: 18px; color: #f2e8cf; margin-bottom: 20px; font-style: italic;"></div>
            <button class="btn" onclick="fecharFeedback()" style="background: #132a13;">Retornar</button>
        </div>
    </div>

    <script>
        const urlDoGoogleScript = "https://script.google.com/macros/s/AKfycbyAZ2SpPsM0S8wQqB9GmU2u5_bn3lY7-Xm3nrGhHo2KsPRlqSPMLU42iCMJKAKkKXUSKg/exec";
        let cenarios = [], crises = [], faseAtual = 0, score = 0, approval = 50, nome = "", historico = "", evSorteado = null;

        window.onload = async () => {
            const btn = document.getElementById('btn-iniciar');
            try {
                const res = await fetch(urlDoGoogleScript);
                const dados = await res.json();
                cenarios = dados.cenarios; crises = dados.crises;
                btn.innerText = "ASSUMIR SECRETARIA"; btn.disabled = false;
            } catch(e) { btn.innerText = "Erro de Conexão"; }
        };

        function startGame() {
            nome = document.getElementById('player-name').value || "Especialista";
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            cenarios = cenarios.sort(() => Math.random() - 0.5);
            carregarFase();
        }

        function carregarFase() {
            if (faseAtual >= cenarios.length) { finalizarJogo(); return; }
            const c = cenarios[faseAtual];
            document.getElementById('fase-info').innerText = `Pauta #${faseAtual+1}: ${c.tema}`;
            document.getElementById('message').innerText = "";
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('btn-check').style.display = 'inline-block';
            
            const zones = ['causa', 'problema', 'consequencia', 'solucao'];
            zones.forEach(z => {
                const dz = document.getElementById(`zone-${z}`);
                dz.innerText = "Arraste a " + z.charAt(0).toUpperCase() + z.slice(1);
                dz.classList.remove('success');
            });

            const cards = [
                {t: 'causa', tx: c.causa}, {t: 'problema', tx: c.problema},
                {t: 'consequencia', tx: c.consequencia}, {t: 'solucao', tx: c.solucao}
            ].sort(() => Math.random() - 0.5);

            const bank = document.getElementById('card-bank');
            bank.innerHTML = "";
            cards.forEach((card, i) => {
                const div = document.createElement('div');
                div.className = 'card'; div.draggable = true; div.id = `c-${faseAtual}-${i}`;
                div.dataset.type = card.t; div.innerText = card.tx;
                div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
                bank.appendChild(div);
            });
        }

        document.querySelectorAll('.drop-zone').forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', e => {
                e.preventDefault();
                const card = document.getElementById(e.dataTransfer.getData('text'));
                if (z.querySelector('.card')) document.getElementById('card-bank').appendChild(z.querySelector('.card'));
                z.innerHTML = ""; z.appendChild(card);
            });
        });

        function checkAnswers() {
            const zones = ['causa', 'problema', 'consequencia', 'solucao'];
            let acertos = 0;
            zones.forEach(z => {
                const card = document.getElementById(`zone-${z}`).querySelector('.card');
                if (card && card.dataset.type === z) { acertos++; document.getElementById(`zone-${z}`).classList.add('success'); }
            });

            if (acertos === 4) {
                score += 100; approval += 10;
                document.getElementById('message').innerText = "✅ PLANO APROVADO!";
                document.getElementById('message').style.color = "#a7c957";
                document.getElementById('btn-check').style.display = 'none';
                document.getElementById('btn-next').style.display = 'inline-block';
            } else {
                approval -= 15;
                document.getElementById('message').innerText = "❌ FALHA TÉCNICA!";
                document.getElementById('message').style.color = "#bc4749";
                if (approval <= 0) finalizarJogo();
            }
            atualizarHUD();
        }

        function atualizarHUD() {
            approval = Math.max(0, Math.min(100, approval));
            document.getElementById('score-display').innerText = score;
            document.getElementById('approval-text').innerText = approval + "%";
            document.getElementById('approval-fill').style.width = approval + "%";
            document.getElementById('approval-fill').style.background = approval > 70 ? '#6a994e' : approval > 30 ? '#f39c12' : '#bc4749';
        }

        function processarProximaFase() {
            faseAtual++;
            if (Math.random() < 0.35 && faseAtual < cenarios.length) {
                evSorteado = crises[Math.floor(Math.random() * crises.length)];
                document.getElementById('texto-crise').innerText = evSorteado.texto;
                document.getElementById('pergunta-crise').innerText = evSorteado.pergunta;
                document.getElementById('resposta-crise').value = "";
                document.getElementById('modal-crise').style.display = 'flex';
            } else { carregarFase(); }
        }

        async function avaliarDecreto() {
            const resp = document.getElementById('resposta-crise').value.trim();
            if (resp.length < 20) { document.getElementById('erro-crise').style.display = 'block'; return; }
            const btn = document.querySelector('#modal-crise .btn');
            btn.innerText = "IA ANALISANDO..."; btn.disabled = true;

            try {
                const res = await fetch(urlDoGoogleScript, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "evaluateAI", pergunta: evSorteado.pergunta, resposta: resp })
                });
                const analise = await res.json();
                historico += `[Fase ${faseAtual}] ${resp} (Nota: ${analise.nota}) | `;
                if (analise.nota > 60) { score += 200; approval += 20; document.getElementById('texto-feedback').innerText = "✅ VALIDADO!"; }
                else { approval -= 20; document.getElementById('texto-feedback').innerText = "❌ REJEITADO!"; }
                document.getElementById('status-feedback').innerText = `Feedback: "${analise.feedback}" (${analise.nota}/100)`;
            } catch (e) { document.getElementById('status-feedback').innerText = "Erro na IA. O conselho deu nota média."; approval += 5; }

            document.getElementById('modal-crise').style.display = 'none';
            document.getElementById('modal-feedback').style.display = 'flex';
            btn.innerText = "Enviar para Auditoria (IA)"; btn.disabled = false;
            atualizarHUD();
        }

        function fecharFeedback() {
            document.getElementById('modal-feedback').style.display = 'none';
            if (approval <= 0) finalizarJogo(); else carregarFase();
        }

        async function finalizarJogo() {
            document.getElementById('message').innerText = "FINALIZANDO GESTÃO... ⏳";
            document.querySelector('.game-board').style.display = 'none';
            document.getElementById('btn-check').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
            document.getElementById('card-bank').innerHTML = '';

            try {
                await fetch(urlDoGoogleScript, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "save", nome, pontuacao: score, mandatos: faseAtual, aprovacao: approval, respostas: historico })
                });
                const rRes = await fetch(urlDoGoogleScript + "?action=ranking");
                const rData = await rRes.json();
                let h = "<h3>🏆 TOP 10 GESTORES</h3><table class='ranking-table'><tr><th>Pos</th><th>Nome</th><th>Pontos</th></tr>";
                rData.forEach((r, i) => h += `<tr><td>${i+1}º</td><td>${r.nome}</td><td>${r.pontuacao}</td></tr>`);
                document.getElementById('ranking-container').innerHTML = h + "</table>";
                document.getElementById('ranking-container').style.display = 'block';
                document.getElementById('message').innerText = approval > 0 ? "GESTÃO CONCLUÍDA!" : "GESTÃO CASSADA!";
            } catch (e) { document.getElementById('message').innerText = "Fim de jogo."; }
        }
    </script>
    <a href="https://legeo.com.br" target="_blank" class="watermark">legeo.com.br</a>
</body>
</html>
